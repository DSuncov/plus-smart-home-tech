spring.application.name=aggregator

spring.kafka.producer.topic.snapshots=telemetry.snapshots.v1
spring.kafka.consumer.topic.sensors=telemetry.sensors.v1

spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=ru.yandex.practicum.kafka.serializer.GeneralAvroSerializer

spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=ru.yandex.practicum.kafka.deserializer.SensorEventDeserializer
spring.kafka.consumer.group-id=aggregator-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.fetch.min.bytes=1
spring.kafka.consumer.properties.max.poll.records=100
spring.kafka.consumer.properties.enable.auto.commit=false
spring.kafka.consumer.properties.fetch.max.wait.ms=5000
spring.kafka.consumer.properties.max.partition.fetch.bytes=1048576

logging.level.ru.practicum.kafka=INFO
logging.level.org.springframework=ERROR
logging.level.org.apache.kafka=WARN



