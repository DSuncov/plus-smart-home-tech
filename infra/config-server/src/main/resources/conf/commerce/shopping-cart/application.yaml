spring:
  application:
    name: shopping-cart
  config:
    activate:
      profile:
        on-profile: ci
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:8541/cart
    username: cart
    password: cart
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always
      schema-locations: classpath:./schema.sql

server:
  port: 0

logging:
  level:
    org:
      springframework: ERROR

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/