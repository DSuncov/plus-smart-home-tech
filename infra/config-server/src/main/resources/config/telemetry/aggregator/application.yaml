spring:
  application:
    name: aggregator
  config:
    activate:
      profile:
        on-profile: ci
  kafka:
    bootstrap-servers: "localhost:9092"
    producer:
      topic: "telemetry.snapshots.v1"
      key-serializer: "org.apache.kafka.common.serialization.StringSerializer"
      value-serializer: "ru.yandex.practicum.kafka.serializer.GeneralAvroSerializer"
    consumer:
      topic: "telemetry.sensors.v1"
      key-deserializer: "org.apache.kafka.common.serialization.StringDeserializer"
      value-deserializer: "ru.yandex.practicum.kafka.deserializer.SensorEventDeserializer"
      group-id: "aggregator-group"
      auto-offset-reset: earliest
      fetch-max-wait-ms: 5000
      max-poll-records: 100
      enable-auto-commit: false

server:
  port: 0

logging:
  level:
    ru:
      practicum:
        kafka: INFO
    org:
      springframework: ERROR
      apache:
        kafka: WARN

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/